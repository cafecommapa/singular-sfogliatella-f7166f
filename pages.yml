media:
  input: imagens
  output: /imagens

content:
  - name: posts
    label: Posts
    type: collection
    path: posts

    fields:
      - name: title
        label: Título
        type: string

      - name: date
        label: Data
        type: date

      - name: cover
        label: Imagem
        type: image

      - name: body
        label: Conteúdo
        type: rich-text